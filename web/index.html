<!DOCTYPE html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta name="description" content="Gym Pro App" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="gympro" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>gympro</title>
    <link rel="manifest" href="manifest.json" />

    <!-- Mobile optimizations -->
    <script src="mobile-config.js"></script>

    <!-- Camera utilities for web -->
    <script>
      // Web camera utilities to bypass Flutter camera plugin issues
      window.webCameraUtils = {
        // Check if camera is available
        isCameraAvailable: async function () {
          try {
            if (
              !navigator.mediaDevices ||
              !navigator.mediaDevices.getUserMedia
            ) {
              return false;
            }

            // Try to get camera access
            const stream = await navigator.mediaDevices.getUserMedia({
              video: true,
            });
            // Stop the stream immediately after checking
            stream.getTracks().forEach((track) => track.stop());
            return true;
          } catch (error) {
            console.log("Camera not available:", error);
            return false;
          }
        },

        // Get camera stream with specific constraints
        getCameraStream: async function (constraints = {}) {
          try {
            const defaultConstraints = {
              video: {
                width: { ideal: 640, max: 1280 },
                height: { ideal: 480, max: 720 },
                frameRate: { ideal: 15, max: 30 },
              },
              audio: false,
            };

            const finalConstraints = Object.assign(
              defaultConstraints,
              constraints
            );
            return await navigator.mediaDevices.getUserMedia(finalConstraints);
          } catch (error) {
            console.error("Failed to get camera stream:", error);
            throw error;
          }
        },

        // Create video element for camera preview
        createVideoElement: function (streamId) {
          const video = document.createElement("video");
          video.id = streamId || "camera-preview";
          video.autoplay = true;
          video.playsInline = true;
          video.muted = true;
          video.style.width = "100%";
          video.style.height = "100%";
          video.style.objectFit = "cover";
          return video;
        },

        // Stop camera stream
        stopCameraStream: function (stream) {
          if (stream) {
            stream.getTracks().forEach((track) => track.stop());
          }
        },
      };
    </script>
  </head>
  <body>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
